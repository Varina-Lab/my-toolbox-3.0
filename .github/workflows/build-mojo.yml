name: Build Mojo

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./mojo-tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cài đặt Pixi và môi trường Mojo (Tự động cache, cực nhanh)
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: mojo-tools/${{ inputs.tool_name }}/pixi.toml
          # Pixi sẽ tự tạo môi trường ảo và cài Mojo vào đó

      - name: Build Executable
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          cd $toolName

          # Dùng 'pixi run' để gọi lệnh mojo bên trong môi trường ảo
          # build src/main.mojo : File nguồn
          # -o : Tên file exe đầu ra
          pixi run mojo build src/main.mojo -o "$toolName.exe"

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          
          # File exe nằm ngay trong root folder của tool
          $exePath = "$toolName/$toolName.exe"
          
          if (Test-Path $exePath) {
             Write-Host "Found Mojo EXE: $exePath"
             Copy-Item $exePath -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Build failed! EXE not found at $exePath"
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_mojo
          path: mojo-tools/dist/*.exe
          if-no-files-found: error
