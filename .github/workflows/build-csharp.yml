name: Build C# (Native AOT)

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./csharp-tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Native AOT
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          
          # Tìm file .csproj
          $projectFile = Get-ChildItem "$toolName/*.csproj" | Select-Object -First 1
          
          if (-not $projectFile) {
            Write-Error "Không tìm thấy file .csproj trong thư mục $toolName"
            exit 1
          }

          # Build ra Native AOT
          # /p:AssemblyName=$toolName : Ép tên file exe output giống tên tool input
          dotnet publish $projectFile.FullName -c Release -r win-x64 /p:AssemblyName=$toolName

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          
          # 1. Tạo folder dist
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null

          # 2. Tìm file EXE thông minh (Quét đệ quy trong thư mục bin để tìm đúng file)
          # Cách này an toàn hơn là hardcode đường dẫn net9.0
          $exeFile = Get-ChildItem -Path "$toolName/bin" -Filter "$toolName.exe" -Recurse | Select-Object -First 1
          
          if ($exeFile) {
             Write-Host "Found EXE at: $($exeFile.FullName)"
             Copy-Item $exeFile.FullName -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Build xong nhưng không tìm thấy file EXE!"
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_csharp
          # SỬA LỖI Ở ĐÂY: Trỏ đúng đường dẫn từ gốc repo
          path: csharp-tools/dist/*.exe
          if-no-files-found: error