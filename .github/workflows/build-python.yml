name: Build Python (Nuitka Standalone)

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          if (Test-Path "python-tools/${{ inputs.tool_name }}/requirements.txt") {
            pip install -r python-tools/${{ inputs.tool_name }}/requirements.txt
          }

      - name: Build with Nuitka (Portable Mode)
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          cd python-tools/$toolName

          # THAY ĐỔI QUAN TRỌNG Ở ĐÂY:
          # --mingw64: Ép Nuitka dùng MinGW thay vì MSVC để tránh phụ thuộc VC++ Redist
          # --standalone & --onefile: Đóng gói tất cả vào 1 file
          # --assume-yes-for-downloads: Tự động tải MinGW về runner
          python -m nuitka `
            --standalone `
            --onefile `
            --mingw64 `
            --assume-yes-for-downloads `
            --output-dir=build `
            src/main.py

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          
          # Nuitka sẽ tạo file main.exe trong thư mục build/
          $exePath = "python-tools/$toolName/build/main.exe"
          
          if (Test-Path $exePath) {
             Copy-Item $exePath -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Build failed! EXE not found."
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_python
          path: dist/*.exe