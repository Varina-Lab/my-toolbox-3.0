name: Build Python (Native EXE)

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./python-tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # zstandard giúp nén file onefile tốt hơn và nhanh hơn
          python -m pip install nuitka zstandard
          if (Test-Path "${{ inputs.tool_name }}/requirements.txt") {
            python -m pip install -r ${{ inputs.tool_name }}/requirements.txt
          }

      - name: Build with Nuitka
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          cd $toolName
          
          # Cấu hình Nuitka tối ưu cho tính di động:
          # --mingw64: Sử dụng trình biên dịch MinGW để giảm sự phụ thuộc vào MSVC compiler
          # --standalone: Tạo thư mục chứa mọi thứ cần thiết để chạy
          # --onefile: Đóng gói toàn bộ thư mục standalone thành 1 file duy nhất
          # --lto=yes: Tối ưu hóa hiệu năng
          # --assume-yes-for-downloads: Tự động tải compiler nếu cần
          python -m nuitka `
            --mingw64 `
            --standalone `
            --onefile `
            --lto=yes `
            --assume-yes-for-downloads `
            --output-filename="$toolName.exe" `
            --output-dir="out" `
            "src/main.py"

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          
          # Tạo folder dist để chứa thành phẩm
          if (-not (Test-Path "dist")) {
              New-Item -ItemType Directory -Path "dist" | Out-Null
          }
          
          # Tìm file EXE trong thư mục out
          $exePath = "$toolName/out/$toolName.exe"
          
          if (Test-Path $exePath) {
             Write-Host "Build thành công. Đang copy artifact..."
             Copy-Item $exePath -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Lỗi: Không tìm thấy file EXE tại $exePath"
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_python
          path: python-tools/dist/*.exe
          if-no-files-found: error