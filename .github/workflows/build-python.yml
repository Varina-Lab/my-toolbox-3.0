name: Build Python (Native EXE)

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./python-tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Nuitka: Trình biên dịch Python sang C++
          # zstandard: Giúp nén file EXE nhỏ hơn
          python -m pip install nuitka zstandard
          if (Test-Path "${{ inputs.tool_name }}/requirements.txt") {
            python -m pip install -r ${{ inputs.tool_name }}/requirements.txt
          }

      - name: Build with Nuitka
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          cd $toolName
          
          # Lệnh biên dịch Nuitka tối ưu:
          # --standalone: Chạy không cần cài Python
          # --onefile: Đóng gói tất cả (bao gồm cả thư viện) vào 1 file EXE duy nhất
          # --lto=yes: Tối ưu hóa liên kết toàn cục (tăng tốc độ chạy)
          # --assume-yes-for-downloads: Tự động tải C compiler nếu thiếu
          # --windows-disable-console: (Tùy chọn) Thêm nếu bạn làm tool có giao diện (GUI), hiện tại để mặc định Console
          python -m nuitka `
            --standalone `
            --onefile `
            --lto=yes `
            --assume-yes-for-downloads `
            --output-filename="$toolName.exe" `
            --output-dir="out" `
            "src/main.py"

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          
          # 1. Tạo folder dist ở thư mục python-tools
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          
          # 2. Đường dẫn file exe sau khi Nuitka build xong
          $exePath = "$toolName/out/$toolName.exe"
          
          if (Test-Path $exePath) {
             Write-Host "Found Python EXE: $exePath"
             Copy-Item $exePath -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Build failed! EXE not found at $exePath"
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_python
          path: python-tools/dist/*.exe
          if-no-files-found: error