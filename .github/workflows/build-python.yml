name: Build Python (Native EXE - No Runtime)

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./python-tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka zstandard
          if (Test-Path "${{ inputs.tool_name }}/requirements.txt") {
            python -m pip install -r ${{ inputs.tool_name }}/requirements.txt
          }

      - name: Build with Nuitka (Static Linking via MinGW)
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          cd $toolName
          
          # GIẢI PHÁP: 
          # 1. --mingw64: Ép sử dụng MinGW thay vì MSVC để tránh phụ thuộc VC++ Redist.
          # 2. --standalone & --onefile: Đóng gói mọi thứ.
          # 3. --static-libpython=yes: Link tĩnh thư viện lõi Python.
          
          python -m nuitka `
            --mingw64 `
            --standalone `
            --onefile `
            --lto=yes `
            --static-libpython=yes `
            --assume-yes-for-downloads `
            --output-filename="$toolName.exe" `
            --output-dir="out" `
            "src/main.py"

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          
          $exePath = "$toolName/out/$toolName.exe"
          
          if (Test-Path $exePath) {
             Write-Host "Found Static Python EXE: $exePath"
             Copy-Item $exePath -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Build failed! EXE not found."
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_python
          path: python-tools/dist/*.exe
          if-no-files-found: error