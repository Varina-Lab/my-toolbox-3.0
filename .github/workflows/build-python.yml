name: Build Python (Nuitka)

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Bản ổn định và nhanh nhất hiện nay
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          if (Test-Path "python-tools/${{ inputs.tool_name }}/requirements.txt") {
            pip install -r python-tools/${{ inputs.tool_name }}/requirements.txt
          }

      - name: Build with Nuitka
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          cd python-tools/$toolName

          # Lệnh biên dịch Nuitka:
          # --standalone: Tạo thư mục chứa đủ mọi thứ để chạy
          # --onefile: Đóng gói tất cả thành 1 file EXE duy nhất
          # --assume-yes-for-downloads: Tự động tải các công cụ hỗ trợ (như MinGW/Dependency Walker)
          # --output-dir: Nơi chứa file sau khi build
          python -m nuitka --standalone --onefile --assume-yes-for-downloads --output-dir=build src/main.py

      - name: Prepare Artifact
        shell: pwsh
        run: |
          $toolName = "${{ inputs.tool_name }}"
          
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          
          # File sau khi build nằm trong thư mục build/
          $exePath = "python-tools/$toolName/build/main.exe"
          
          if (Test-Path $exePath) {
             Write-Host "Found Python EXE: $exePath"
             Copy-Item $exePath -Destination "dist/$toolName.exe"
          } else {
             Write-Error "Build failed! EXE not found."
             exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_python
          path: dist/*.exe
          if-no-files-found: error