name: Build Go

on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục (Ví dụ: _template)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./go-tools

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' # Luôn lấy bản mới nhất
          cache-dependency-path: go-tools/${{ inputs.tool_name }}/go.sum

      - name: Build (Optimized)
        shell: pwsh
        run: |
          # Di chuyển vào thư mục tool
          cd ${{ inputs.tool_name }}

          # Tải dependencies nếu có (nếu bạn thêm thư viện ngoài)
          if (Test-Path "go.sum") {
            go mod download
          } else {
            # Nếu chưa có go.sum (lần đầu), chạy tidy để auto-fix
            go mod tidy
          }

          # Tạo thư mục output
          New-Item -ItemType Directory -Force -Path "../../dist" | Out-Null

          # BUILD LỆNH:
          # -ldflags "-s -w": Loại bỏ bảng ký hiệu và thông tin debug (Giảm dung lượng file tối đa)
          # -o: Chỉ định tên file đầu ra trực tiếp
          go build -ldflags "-s -w" -o "../../dist/${{ inputs.tool_name }}.exe" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tool_name }}_go
          path: dist/*.exe
          if-no-files-found: error
